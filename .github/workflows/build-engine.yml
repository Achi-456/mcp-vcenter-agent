name: Build Agent Engine

on:
  push:
    branches: [rebuild/vcenter-agentic-platform]
    paths:
      - "apps/engine/**"
      - ".github/workflows/build-engine.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/engine
          push: true
          tags: |
            ghcr.io/achi-456/agentic-engine:0.12.0
            ghcr.io/achi-456/agentic-engine:${{ github.sha }}

