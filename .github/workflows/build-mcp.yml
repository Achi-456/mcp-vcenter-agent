name: Build MCP Server

on:
  push:
    branches: [main-rke2-mcp]
    paths:
      - "apps/mcp/**"
      - ".github/workflows/build-mcp.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/mcp
          push: true
          tags: |
            ghcr.io/achi-456/agentic-mcp:0.7.0
            ghcr.io/achi-456/agentic-mcp:${{ github.sha }}

      - name: Update MCP image tag in GitOps manifest
        run: |
          sed -i "s|ghcr.io/achi-456/agentic-mcp:.*|ghcr.io/achi-456/agentic-mcp:${{ github.sha }}|g" \
            k8s/apps/agentic-app/mcp/deployment.yaml

      - name: Commit and push GitOps manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/agentic-app/mcp/deployment.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci: update mcp image to ${{ github.sha }} [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main-rke2-mcp
            git push origin HEAD:main-rke2-mcp && exit 0
            sleep 5
          done
          exit 1
