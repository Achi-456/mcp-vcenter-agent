name: Build MCP Server

on:
  push:
    branches: [rebuild/vcenter-agentic-platform]
    paths:
      - "apps/mcp/**"
      - ".github/workflows/build-mcp.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/mcp
          push: true
          tags: |
            ghcr.io/achi-456/agentic-mcp:0.7.0
            ghcr.io/achi-456/agentic-mcp:${{ github.sha }}

