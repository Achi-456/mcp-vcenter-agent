name: Build FastAPI

on:
  push:
    branches: [main-rke2-mcp]
    paths:
      - "apps/backend/**"
      - ".github/workflows/build-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          push: true
          tags: |
            ghcr.io/achi-456/agentic-fastapi:0.7.0
            ghcr.io/achi-456/agentic-fastapi:${{ github.sha }}
