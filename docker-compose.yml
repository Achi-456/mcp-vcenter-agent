services:
  # ── FastAPI Backend (vCenter AI API) ──────────────────────────────────
  vcenter-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vcenter-api
    env_file: .env          # ANTHROPIC/OPENAI/GOOGLE/XAI keys, VCENTER_*, GOVC_*, TAVILY_API_KEY, AGENT_*
    environment:
      - AGENT_MAX_TURNS=${AGENT_MAX_TURNS:-25}
      - AGENT_MAX_TOKENS=${AGENT_MAX_TOKENS:-4096}
      - AGENT_PROVIDER=${AGENT_PROVIDER:-anthropic}
      - AGENT_PLANNER=${AGENT_PLANNER:-0}
      - AGENT_REFLECTION=${AGENT_REFLECTION:-0}
      - AGENT_REVIEWER=${AGENT_REVIEWER:-0}
      # TAVILY_API_KEY: only from env_file:.env (do not set empty here — it overrides .env)
      - AGENT_ALLOW_DESTRUCTIVE_WEB=${AGENT_ALLOW_DESTRUCTIVE_WEB:-0}
    restart: unless-stopped
    networks:
      - vcenter-net
    volumes:
      - ./:/app
    # Not exposed to host — nginx proxies internally
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Nginx (Web Server + Reverse Proxy on port 80) ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: vcenter-nginx
    ports:
      - "80:80"             # Access at http://localhost:80 (Docker Desktop) or http://serverip:80 (Ubuntu)
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static/dashboard.html:/usr/share/nginx/html/dashboard.html:ro
    depends_on:
      vcenter-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vcenter-net

networks:
  vcenter-net:
    driver: bridge
