apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-engine
  namespace: agentic-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-engine
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

