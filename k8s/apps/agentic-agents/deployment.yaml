apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-engine
  namespace: agentic-agents
  labels:
    app: agent-engine
    phase: "12"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-engine
  template:
    metadata:
      labels:
        app: agent-engine
    spec:
      nodeSelector:
        role: app-worker
        kubernetes.io/hostname: agentic-worker-02.dclab.local
      containers:
        - name: agent-engine
          image: ghcr.io/achi-456/agentic-engine:5c8ce5e3494666db6fa1acf4cf146c65b6702e0a
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: agentic-engine-secrets
            - configMapRef:
                name: agentic-engine-config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

