apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: agentic-app
  labels:
    app: mcp-server
    phase: "07"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: agentic-worker-01.dclab.local
        role: app-worker
      containers:
        - name: mcp-server
          image: ghcr.io/achi-456/agentic-mcp:9b096159bfbce0ab9af140ac77dc3671c9cf4d8f
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - secretRef:
                name: agentic-app-secrets
            - configMapRef:
                name: agentic-app-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
