apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: agentic-app
  labels:
    app: fastapi
    phase: "07"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      serviceAccountName: agentic-api
      nodeSelector:
        kubernetes.io/hostname: agentic-worker-01.dclab.local
        role: app-worker
      containers:
        - name: fastapi
          image: ghcr.io/achi-456/agentic-fastapi:6d56851352695add0e4d600e480783b53ae77ee5
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: agentic-app-secrets
            - configMapRef:
                name: agentic-app-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
