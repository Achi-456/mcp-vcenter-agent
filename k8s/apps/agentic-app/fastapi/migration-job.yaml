apiVersion: batch/v1
kind: Job
metadata:
  name: fastapi-phase1-migrations
  namespace: agentic-app
  labels:
    app: fastapi
    component: migrations
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: fastapi
        component: migrations
    spec:
      restartPolicy: Never
      serviceAccountName: agentic-api
      nodeSelector:
        kubernetes.io/hostname: agentic-worker-01.dclab.local
        role: app-worker
      containers:
        - name: alembic
          image: ghcr.io/achi-456/agentic-fastapi:458d526462618275aa7a4d5f5f76b537a00365d0
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: agentic-app-secrets
            - configMapRef:
                name: agentic-app-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
