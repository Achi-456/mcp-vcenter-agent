apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-tls
  namespace: agentic-app
spec:
  secretName: app-tls
  dnsNames:
    - app.dclab.local
  issuerRef:
    name: dclab-local-selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-tls
  namespace: agentic-app
spec:
  secretName: api-tls
  dnsNames:
    - api.dclab.local
  issuerRef:
    name: dclab-local-selfsigned
    kind: ClusterIssuer
