apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs
  namespace: agentic-app
  labels:
    app: nextjs
    phase: "07"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs
  template:
    metadata:
      labels:
        app: nextjs
    spec:
      nodeSelector:
        kubernetes.io/hostname: agentic-worker-01.dclab.local
        role: app-worker
      containers:
        - name: nextjs
          image: ghcr.io/achi-456/agentic-nextjs:2ab36d7ba83cfcd36d9e034c2b1f0f711440ef86
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: agentic-app-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: agentic-app-config
                  key: NEXT_PUBLIC_WS_URL
            - name: NEXT_PUBLIC_APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: agentic-app-config
                  key: NEXT_PUBLIC_APP_NAME
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
