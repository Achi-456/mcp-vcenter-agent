apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dclab-selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dclab-local-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: dclab.local
  secretName: dclab-local-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: dclab-selfsigned-bootstrap
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dclab-local-ca
spec:
  ca:
    secretName: dclab-local-ca
