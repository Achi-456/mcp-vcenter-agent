server {
    listen 80;
    server_name _;

    # ── Serve the static dashboard HTML ──────────────────────────────────
    root /usr/share/nginx/html;
    index dashboard.html;

    location = / {
        try_files /dashboard.html =404;
    }

    location = /dashboard.html {
        try_files $uri =404;
    }

    # ── Proxy all /api/* requests to FastAPI ─────────────────────────────
    location /api/ {
        proxy_pass         http://vcenter-api:8000/api/;
        proxy_http_version 1.1;

        # Required for SSE (Server-Sent Events) streaming AI chat
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ── FastAPI Swagger docs (optional, for debugging) ────────────────────
    location /docs {
        proxy_pass http://vcenter-api:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://vcenter-api:8000/openapi.json;
        proxy_set_header Host $host;
    }
}
